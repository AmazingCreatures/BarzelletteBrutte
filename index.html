<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sito Semplice</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #cccf0e;
        }
        #message {
            display: none;
            margin-top: 20px;
            font-size: 20px;
            color: #000000;
        }
    </style>
</head>
<body>
    <button onclick="showMessage()">Mostra barzelletta!</button>
    <div id="message"></div>
    
    <script>
        const phrases = [
            "Ecco la frase che volevi vedere!",
            "La vita è bella!",
            "Ogni giorno è una nuova opportunità.",
            "Segui i tuoi sogni.",
            "Fai del tuo meglio!"
        ];

        function showMessage() {
            // Seleziona una frase casuale
            const randomIndex = Math.floor(Math.random() * phrases.length);
            const message = phrases[randomIndex];
            
            // Mostra la frase
            const messageElement = document.getElementById('message');
            messageElement.textContent = message;
            messageElement.style.display = 'block';
        }
    </script>
</body>
</html>
